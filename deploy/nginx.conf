# nginx config for the membership SPA.
# Replaces what Netlify did: static serving, SPA fallback, image handling,
# and the 2C2P payment-return function (via the return-2c2p bridge service).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache hashed build assets aggressively
    location /assets/ {
        try_files $uri =404;          # real files only; do NOT SPA-fallback missing assets
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 2C2P payment return: 2C2P POSTs here -> bridge converts POST->303 GET to the SPA route.
    # (nginx can't read the POST body itself, so it proxies to the tiny return-2c2p service.)
    location = /.netlify/functions/return-2c2p {
        proxy_pass http://return-2c2p:8787;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: every other route serves index.html (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
